apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend-svc
spec:
  selector:
    app: {{ .Chart.Name }}
    component: backend
    release: {{ .Release.Name }}
  ports:
    - port: {{ .Values.service.backend.port }}
      targetPort: {{ .Values.service.backend.targetPort }}
  type: {{ .Values.service.backend.type }}