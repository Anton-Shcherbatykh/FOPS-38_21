apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-exchange
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-exchange
  template:
    metadata:
      labels:
        app: data-exchange
    spec:
      volumes:
      - name: shared-data
        emptyDir: {}
      containers:
      - name: busybox-writer
        image: busybox:latest
        command: ["/bin/sh"]
        args: ["-c", "while true; do echo $(date) 'Hello from busybox' >> /data/shared.log; sleep 5; done"]
        volumeMounts:
        - name: shared-data
          mountPath: /data
      - name: multitool-reader
        image: wbitt/network-multitool:latest
        command: ["/bin/sh"]
        args: ["-c", "tail -f /data/shared.log"]
        volumeMounts:
        - name: shared-data
          mountPath: /data