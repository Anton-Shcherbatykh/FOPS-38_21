apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>ConfigMap Demo</title></head>
    <body>
    <h1>Hello from ConfigMap!</h1>
    <p>This page is mounted from a Kubernetes ConfigMap.</p>
    </body>
    </html>